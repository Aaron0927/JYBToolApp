name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1

      - name: Build App
        run: |
          xcodebuild \
            -project JYBToolApp.xcodeproj \
            -scheme JYBToolApp \
            -configuration Release \
            -archivePath build/JYBToolApp.xcarchive \
            -destination 'generic/platform=macOS' \
            archive \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO
          ditto "build/JYBToolApp.xcarchive/Products/Applications/JYBToolApp.app" "build/JYBToolApp.app"

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Create DMG
        run: |
          create-dmg \
            --volname "JYBToolApp" \
            --window-pos 200 120 \
            --icon-size 100 \
            --icon "JYBToolApp.app" 150 150 \
            --hide-extension "JYBToolApp.app" \
            --app-drop-link 480 150 \
            "sparkle/JYBToolApp-${{ github.ref_name }}.dmg" \
            "build/JYBToolApp.app"

      - name: Write Sparkle Ed25519 key
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.APPED25519 }}
        run: |
          printf "%s" "$SPARKLE_PRIVATE_KEY" | tr -d '\r' > sparkle/ed25519_private_key

      - name: Download Sparkle tools
        run: |
          curl -L https://github.com/sparkle-project/Sparkle/releases/download/2.9.0/Sparkle-for-Swift-Package-Manager.zip -o sparkle/Sparkle.zip
          unzip -o sparkle/Sparkle.zip -d sparkle

      - name: Generate Appcast
        run: |
          generate_appcast_path="$(find sparkle -type f -name generate_appcast -print -quit)"
          if [ -z "$generate_appcast_path" ]; then
            echo "generate_appcast not found under sparkle directory"
            find sparkle -maxdepth 4 -type f | sed -n '1,200p'
            exit 1
          fi
          chmod +x "$generate_appcast_path"
          "$generate_appcast_path" --ed-key-file sparkle/ed25519_private_key sparkle

      - name: Update appcast.xml in docs
        run: |
          cp sparkle/appcast.xml docs/appcast.xml

      - name: Commit appcast.xml
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add docs/appcast.xml
          git diff --cached --quiet || git commit -m "docs: update appcast.xml for ${{ github.ref_name }}"
          git push https://github.com/${{ github.repository }}.git HEAD:main

      - name: Upload Release
        uses: softprops/action-gh-release@v2
        with:
          files: sparkle/*.dmg
