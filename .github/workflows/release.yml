name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1

      - name: Build App
        run: |
          xcodebuild \
            -project JYBToolApp.xcodeproj \
            -scheme JYBToolApp \
            -configuration Release \
            -archivePath build/JYBToolApp.xcarchive \
            archive

      - name: Create sparkle directory
        run: mkdir -p sparkle

      - name: Create DMG
        run: |
          hdiutil create \
            -volname JYBToolApp \
            -srcfolder build/JYBToolApp.app \
            -ov \
            -format UDZO \
            sparkle/JYBToolApp-${{ github.ref_name }}.dmg

      - name: Import Sparkle Key to Keychain
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.APPED25519 }}
        run: |
          echo "$SPARKLE_PRIVATE_KEY" > sparkle/private_key.pem
          security create-keychain -p temp-password temp.keychain
          security unlock-keychain -p temp-password temp.keychain
          security import sparkle/private_key.pem -k temp.keychain -P ""

      - name: Download Sparkle tools
        run: |
          curl -L https://github.com/sparkle-project/Sparkle/releases/download/2.9.0/Sparkle-for-Swift-Package-Manager.zip -o sparkle/Sparkle.zip
          unzip -o sparkle/Sparkle.zip -d sparkle

      - name: Generate Appcast
        run: |
          chmod +x sparkle/Sparkle/bin/generate_appcast
          ./sparkle/Sparkle/bin/generate_appcast sparkle

      - name: Upload Release
        uses: softprops/action-gh-release@v2
        with:
          files: sparkle/*.dmg
